name: libuvula-env
channels:
  - defaults
  - conda-forge
  - nvidia

dependencies:
  - python=3.11
  - pip
  - cmake=4.0.3
  - gcc=14.2.0
  - gxx=14.2.0
  - gcc_linux-64=14.2.0
  - ninja=1.13.0
  - cpython=3.11
  - pybind11=3.0.2
  - spdlog=1.17.0
  - range-v3=0.12.0
  - pip:
      -r requirements.txt